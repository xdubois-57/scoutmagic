name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ghostscript (PDF rasterization for Core\File\PdfRasterizer)
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_mysql, openssl, imagick
          coverage: none

      - name: PHP syntax check
        run: find core/ public/ -name '*.php' -exec php -l {} \; | grep -v 'No syntax errors' | head -20 && find core/ public/ -name '*.php' -exec php -l {} \; | grep -q 'Parse error' && exit 1 || true

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse core/ --level=6

      - name: Run tests
        run: vendor/bin/phpunit

  database-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_mysql, openssl

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run database tests
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: 3306
          TEST_DB_NAME: test_db
          TEST_DB_USER: root
          TEST_DB_PASSWORD: test_password
        run: vendor/bin/phpunit --group=database

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Audit dependencies
        run: composer audit
